services:
  postgres:
    image: postgres:16-alpine
    container_name: reposage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: reposage
      POSTGRES_PASSWORD: reposage
      POSTGRES_DB: reposage
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    container_name: reposage-redis
    restart: unless-stopped
    ports:
      - "6380:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reposage-backend
    restart: unless-stopped
    ports:
      - "8001:8000"

    environment:
      DATABASE_URL: postgresql://reposage:reposage@postgres:5432/reposage
      REDIS_URL: redis://redis:6379/0
      GROQ_API_KEY: ${GROQ_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      PORT: "8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reposage-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"

    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8001